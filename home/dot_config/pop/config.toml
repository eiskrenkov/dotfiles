exclude_current_session = false
exclude_current_dir = false
disambiguation_strategy = ""
quick_access_modifier = ""

[project]
unread_notifications_enabled = true

[worktree]
unread_notifications_enabled = true

[[worktree.commands]]
key = "ctrl+a"
label = "new"
command = "create-worktree"
exit = true

[[projects]]
  path = "~/tds"
  display_depth = 1

[[projects]]
  path = "~/dev"
  display_depth = 1

[[projects]]
  path = "~/tds/*"
  display_depth = 1

[[projects]]
  path = "~/dev/*"
  display_depth = 1

[[projects]]
  path = "~/.local/share/chezmoi"
  display_depth = 1
